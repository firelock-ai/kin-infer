name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      # Clippy debt allow-list burned down 2026-06-11. The 7 enumerated lints were
      # FIXED (unnecessary_cast, cloned_ref_to_slice_refs) or RECLASSIFIED as
      # intentional via scoped, justified in-source `#[allow]`s: too_many_arguments
      # and needless_range_loop (GPU op signatures + flat-buffer tensor kernels),
      # type_complexity (multi-output tensor tuples), excessive_precision (GELU
      # sqrt(2/π) constant), vec_init_then_push (cfg-gated device discovery).
      # Gate is fully ENFORCING with NO command-line allows — keep it that way;
      # no broad `-A` re-additions without lead sign-off.
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test
