name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      # TEMPORARY debt allow-list — burn down in a follow-up kin-infer clippy
      # cleanup; no additions without lead sign-off. Enumerated 2026-06-11 from
      # `cargo clippy --all-targets` (default features): 7 distinct clippy lints,
      # mostly clippy-1.94 new/strictness lints (e.g. cloned_ref_to_slice_refs).
      # Gate stays ENFORCING (-D warnings retained); only these named lints are
      # allowed, each overriding the broad deny because it appears after it.
      - name: Clippy
        run: >
          cargo clippy --all-targets -- -D warnings
          -A clippy::cloned_ref_to_slice_refs
          -A clippy::excessive_precision
          -A clippy::needless_range_loop
          -A clippy::too_many_arguments
          -A clippy::type_complexity
          -A clippy::unnecessary_cast
          -A clippy::vec_init_then_push

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test

  notify-downstream:
    name: Notify Downstream Repos
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger kin CI
        if: ${{ env.DISPATCH_TOKEN != '' }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: firelock-ai/kin
          event-type: dependency-updated
          client-payload: '{"source": "kin-infer", "sha": "${{ github.sha }}"}'
