#
# cargo-deny configuration for the kin-infer crate.
# Checks: advisories, licenses, bans, sources.
# Run locally: cargo deny check
#
# Mirrors the kin workspace policy so the ecosystem shares one license allow-list
# and advisory posture. Without this file cargo-deny falls back to deny-by-default
# and rejects every dependency license (~30 rejections) plus every unmaintained
# advisory — which is why SAST has been red.

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# --- Advisory database (replaces standalone cargo-audit) ---
[advisories]
# Ignore specific advisories that cannot be resolved yet.
# Each entry must have a reason explaining why it is safe to ignore.
ignore = [
    # Transitive, build-time-only, no fixed upgrade available. Both arrive via
    # tokenizers (tokenizers -> indicatif/macro_rules_attribute) and are
    # "unmaintained" notices, not vulnerabilities. No runtime exposure; no safe
    # upgrade exists today. Revisit when tokenizers drops these deps.
    { id = "RUSTSEC-2024-0436", reason = "paste 1.0.15 unmaintained — transitive via tokenizers/metal; no fix available, no vuln" },
    { id = "RUSTSEC-2025-0119", reason = "number_prefix 0.4.0 unmaintained — transitive via indicatif/tokenizers; no fix available, no vuln" },
]

# --- License policy ---
[licenses]
# kin-infer is Apache-2.0. All transitive dependencies must use compatible licenses.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

# --- Crate bans ---
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# --- Source provenance ---
[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = ["firelock-ai"]
