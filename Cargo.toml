[package]
name = "kin-infer"
version = "0.1.1"
edition = "2021"
license = "Apache-2.0"
authors = ["Troy Fortin <troy@firelock.ai>"]
description = "Universal transformer inference engine — pure Rust, zero framework dependencies"
repository = "https://github.com/firelock-ai/kin-infer"

[lib]
doctest = false

[dependencies]
ndarray = "0.16"
safetensors = "0.5"
half = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
hashbrown = "0.15"
thiserror = "2"
